<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آفلاین</title>
    <style>
      body { font-family: sans-serif; background:#f8fafc; color:#0f172a; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
      .box { max-width:520px; background:#fff; border:1px solid #e2e8f0; border-radius:24px; padding:32px; box-shadow:0 10px 30px rgba(15,23,42,.08); text-align:center; }
      h1 { margin-top:0; color:#6d28d9; }
      p { line-height:2; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>برنامه به اینترنت متصل نیست</h1>
      <p>اگر قبلاً برنامه را باز کرده باشید، بعد از برگشت اتصال اینترنت دوباره همگام می‌شود. برای استفاده کامل، اتصال را بررسی کنید.</p>
    </div>
  </body>
</html>
